name: Publish Docker Image to GHCR

# Run this workflow every time code is pushed to the 'main' branch
on:
  push:
    branches: [ "main" ]

# Environment variables available to all jobs
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # ---- ADD THIS NEW STEP ----
      # This step creates a new environment variable IMAGE_NAME_LC with a lowercase version of the repo name.
      - name: Set image name to lowercase
        run: echo "IMAGE_NAME_LC=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ---- UPDATE THIS LINE ----
          # Use the new lowercase environment variable here.
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest
          build-args: |
            SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}